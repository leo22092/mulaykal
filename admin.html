<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Temple Admin Dashboard</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <script>
    if (!sessionStorage.getItem('templeAdminToken') && !localStorage.getItem('templeAdminToken')) {
      window.location.href = 'login.html';
    }
  </script>
  <div class="sidebar">
    <h2>Temple Admin</h2>
    <div class="menu-item active" onclick="switchTab('trustees')">Trustees</div>
    <div class="menu-item" onclick="switchTab('acharyas')">Spiritual Guides (Acharyas)</div>
    <div class="menu-item" onclick="switchTab('poojas')">Poojas</div>
    <div class="menu-item" onclick="switchTab('ulsavam')">Ulsavam</div>
    <div class="menu-item" onclick="switchTab('gallery')">Gallery Archives</div>
    <div class="menu-item" onclick="switchTab('story')">Story / About</div>
    <div class="menu-item" onclick="switchTab('documents')">Notices & Documents</div>
    <div class="menu-item" onclick="switchTab('contacts')">Administration & Global</div>
    
    <div style="flex:1"></div>
    <p style="font-size:0.8rem;color:#888;">Website reads live data from the Cloudflare Worker at /js/data.js.</p>
    <a href="index.html" style="color:var(--gold);text-decoration:none;margin-bottom:1rem;display:block;">↗ View Website</a>
    <button class="btn-secondary" onclick="window.adminLogout()">Log out</button>
  </div>
  
  <div class="main">
    <div class="header-actions">
      <h1 id="pageTitle" style="margin:0;">Trustees</h1>
      <div>
        <button onclick="saveLocal()">💾 Save Draft Locally</button>
        <button class="btn-primary" id="saveCloudBtn" onclick="saveToCloud()" style="background:#2ecc71; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;" title="Save your changes to Cloudflare">☁ Publish To Cloudflare Worker</button>
        <button class="btn-secondary" onclick="exportDataJS()">⬇ Download data.js</button>
      </div>
    </div>
    <div id="contentArea"></div>
  </div>

  <!-- Load default data -->
  <script src="js/data.js"></script>
  <!-- Admin panel logic -->
  <script src="js/admin.js"></script>
</body>
</html>
